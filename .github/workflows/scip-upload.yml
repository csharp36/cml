name: SCIP Upload

# Keeps the indexer's *semantic* layer (SCIP) in lockstep with its *structural*
# layer. The indexer's GitHub webhook re-runs tree-sitter on every push to main
# (updating last_indexed_sha); this job regenerates and re-uploads SCIP for the
# same commit so scip_sha == last_indexed_sha and get_index_health reports `fresh`.
on:
  push:
    branches: [main]
    tags: ['*']
    # On a tag push, git rev-parse HEAD resolves to the tag's commit SHA, so the
    # upload is automatically keyed to that SHA — no script change required.
    # Note: full type-resolved tag *queries* also require the tag to be indexed
    # as a branch_index overlay (handled by Phase 1 lazy fault-in / a future
    # Phase 4 CI trigger); this job only covers the SCIP semantic layer.
  workflow_dispatch: {}   # allow manual re-upload (e.g. after fixing a stale repo)

# A newer commit's SCIP should win. Cancel an in-flight upload for an older SHA
# rather than racing it — last writer wins anyway, this just avoids wasted work.
concurrency:
  group: scip-upload-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scip-upload:
    runs-on: ubuntu-latest        # see note: must reach SCIP_SERVER (self-hosted if indexer is internal)
    timeout-minutes: 20           # scip-java does a full compile; cml indexes in ~minutes
    steps:
      # Reachability gate. The indexer may be offline (e.g. it runs on a laptop behind
      # a tunnel), in which case there's nothing to upload to — and that's not a failure.
      # Probe SCIP_SERVER first and, if it's down (or unconfigured), skip every step below
      # so the job ends green instead of wasting a ~15-min build on a doomed upload.
      - name: Check indexer reachability
        id: reachability
        env:
          SCIP_SERVER: ${{ secrets.SCIP_SERVER }}
        run: |
          set -uo pipefail
          if [ -z "${SCIP_SERVER:-}" ]; then
            echo "::notice title=SCIP upload skipped::SCIP_SERVER is not configured — nothing to upload to."
            echo "reachable=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Any HTTP response (even 401/404) proves the indexer is up; "000" / non-zero
          # curl means we couldn't connect (DNS, timeout, refused) -> treat as offline.
          code=$(curl -sS -m 15 --retry 2 --retry-delay 3 -o /dev/null -w '%{http_code}' \
                   "${SCIP_SERVER%/}/admin/health" || true)
          if [ -n "$code" ] && [ "$code" != "000" ]; then
            echo "::notice title=Indexer reachable::HTTP $code from $SCIP_SERVER — proceeding with SCIP upload."
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=SCIP upload skipped::Indexer at $SCIP_SERVER is unreachable (offline?) — skipping, not failing."
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.reachability.outputs.reachable == 'true'
        with:
          fetch-depth: 1          # HEAD only; X-Git-SHA = git rev-parse HEAD = the pushed main commit

      # cml is Java 21 / Gradle (Kotlin DSL). scip-java forks its own Gradle build
      # (scipCompileAll), so it needs the same JDK the project compiles with.
      - name: Set up JDK 21
        if: steps.reachability.outputs.reachable == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        if: steps.reachability.outputs.reachable == 'true'
        uses: gradle/actions/setup-gradle@v4   # dependency + build cache

      - name: Install scip-java (coursier)
        if: steps.reachability.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          # scip-java is NOT in coursier's default app channel, so `cs install scip-java`
          # fails. Use a standalone bootstrap launcher (the documented CI method) instead.
          curl -fL https://github.com/coursier/launchers/raw/master/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          mkdir -p "$HOME/bin"
          ./cs bootstrap --standalone -o "$HOME/bin/scip-java" \
            --main-class com.sourcegraph.scip_java.ScipJava \
            com.sourcegraph:scip-java_2.13:0.12.3
          rm cs
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/scip-java" version   # fail loudly here if the launcher is broken

      # Build the runnable fat jar so scip-upload.sh can split large SCIP files.
      # The script auto-detects size: files <= part cap upload single-shot (the jar is
      # simply unused); larger files are split into valid sub-indexes and uploaded via the
      # multi-part session API. Providing the jar unconditionally makes the upload step
      # size-independent — the same command works whether the index is 5 MB or 500 MB.
      - name: Build SCIP splitter jar
        if: steps.reachability.outputs.reachable == 'true'
        run: ./gradlew shadowJar   # -> build/libs/indexer.jar

      # scip-upload.sh auto-detects Java (build.gradle.kts present), runs
      # `scip-java index --output index.scip`, then POSTs to /api/scip/<repo>
      # with X-Git-SHA = HEAD. --fail-on-error makes a bad upload fail the job.
      # SCIP_SPLITTER_JAR is honored automatically (equivalent to --splitter-jar).
      - name: Generate and upload SCIP
        if: steps.reachability.outputs.reachable == 'true'
        run: ./scripts/scip-upload.sh --fail-on-error
        env:
          SCIP_SPLITTER_JAR: ${{ github.workspace }}/build/libs/indexer.jar
          SCIP_SERVER: ${{ secrets.SCIP_SERVER }}
          SCIP_REPO: ${{ github.event.repository.name }}   # = "cml"
          SCIP_API_KEY: ${{ secrets.SCIP_API_KEY }}         # key with scipUpload: true (CI_UPLOAD_KEY)
